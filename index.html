<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEO AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#fff;font-family:'Plus Jakarta Sans',sans-serif}
        #messages::-webkit-scrollbar{width:5px}
        #messages::-webkit-scrollbar-track{background:transparent}
        #messages::-webkit-scrollbar-thumb{background:#d4d4d4;border-radius:9px}
        #messages::-webkit-scrollbar-thumb:hover{background:#aaa}

        .msg-in{animation:msgIn .32s cubic-bezier(.22,1,.36,1) forwards}
        @keyframes msgIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

        .dot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:dotB 1.3s ease-in-out infinite}
        .dot:nth-child(2){animation-delay:.18s}
        .dot:nth-child(3){animation-delay:.36s}
        @keyframes dotB{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

        #user-input{resize:none;max-height:180px;scrollbar-width:thin}
        #user-input::-webkit-scrollbar{width:3px}
        #user-input::-webkit-scrollbar-thumb{background:#d4d4d4;border-radius:9px}

        .ac p{margin:.45em 0;line-height:1.75}
        .ac h1,.ac h2,.ac h3{margin:1em 0 .4em;font-weight:700}
        .ac h1{font-size:1.45em}.ac h2{font-size:1.2em}.ac h3{font-size:1.05em}
        .ac ul,.ac ol{margin:.4em 0;padding-left:1.5em}
        .ac li{margin:.2em 0;line-height:1.75}
        .ac code:not(pre code){background:#f0fdf4;padding:.12em .38em;border-radius:5px;font-size:.86em;font-family:'SF Mono','Fira Code','Cascadia Code',monospace;color:#166534}
        .ac pre{background:#f6f8fa;border-radius:10px;padding:1em;overflow-x:auto;margin:.7em 0;position:relative;border:1px solid #e8e8e8}
        .ac pre code{font-family:'SF Mono','Fira Code','Cascadia Code',monospace;font-size:.84em;line-height:1.65}
        .ac blockquote{border-left:3px solid #86efac;padding-left:1em;margin:.5em 0;color:#6b7280}
        .ac a{color:#16a34a;text-decoration:underline}
        .ac table{border-collapse:collapse;margin:.7em 0;width:100%;display:block;overflow-x:auto}
        .ac th,.ac td{border:1px solid #d1d5db;padding:.45em .7em;text-align:left}
        .ac th{background:#f0fdf4;font-weight:600}
        .ac strong{font-weight:700}.ac em{font-style:italic}
        .ac hr{border:none;border-top:1px solid #e5e7eb;margin:1em 0}

        .cpbtn{position:absolute;top:.5em;right:.5em;background:#e5e7eb;border:none;border-radius:6px;padding:.25em .55em;cursor:pointer;font-size:.72em;color:#374151;opacity:0;transition:opacity .2s,background .15s;font-family:'Plus Jakarta Sans',sans-serif}
        .ac pre:hover .cpbtn{opacity:1}
        .cpbtn:hover{background:#d1d5db}

        .gen-img{border-radius:14px;max-width:100%;margin:.6em 0;box-shadow:0 2px 12px rgba(0,0,0,.07)}
        .img-load{width:320px;height:320px;background:#f3f4f6;border-radius:14px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
        .img-load::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);animation:shim 1.4s infinite}
        @keyframes shim{to{left:100%}}

        .logo-breathe{animation:breathe 3.5s ease-in-out infinite}
        @keyframes breathe{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.04);filter:brightness(1.06)}}

        .chip{border:1px solid #e5e7eb;border-radius:22px;padding:.55em 1.15em;font-size:.84em;color:#374151;background:#fff;cursor:pointer;transition:all .2s;white-space:nowrap}
        .chip:hover{background:#f0fdf4;border-color:#86efac;transform:translateY(-1px);color:#166534}

        .send-on{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;cursor:pointer;box-shadow:0 2px 8px rgba(22,163,74,.25)}
        .send-off{background:#f0f0f0;color:#b0b0b0;cursor:default}

        .fadein{animation:fadein .45s ease-out forwards}
        @keyframes fadein{from{opacity:0}to{opacity:1}}

        .chat-img{max-width:260px;max-height:260px;border-radius:14px;object-fit:cover}
        .rmv-img{position:absolute;top:-7px;right:-7px;background:#333;color:#fff;border:none;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;line-height:1;transition:background .15s}
        .rmv-img:hover{background:#111}

        .newlnk{color:#bbb;font-size:.72rem;cursor:pointer;transition:color .2s;text-align:center;padding:3px 0}
        .newlnk:hover{color:#16a34a}

        .inp-wrap{background:#f9fafb;border-color:#e5e7eb}
        .inp-wrap:focus-within{background:#fff;border-color:#86efac;box-shadow:0 0 0 3px rgba(34,197,94,.08)}

        @media(max-width:640px){
            .chat-img{max-width:200px;max-height:200px}
            .img-load{width:240px;height:240px}
        }
    </style>
</head>
<body class="bg-white text-gray-900 h-screen flex flex-col overflow-hidden">

    <div id="messages" class="flex-1 overflow-y-auto">
        <div id="empty-state" class="flex flex-col items-center justify-center h-full select-none px-4">
            <div class="logo-breathe mb-5">
                <div class="w-[68px] h-[68px] rounded-[18px] flex items-center justify-center shadow-lg" style="background:linear-gradient(135deg,#15803d 0%,#22c55e 50%,#4ade80 100%);box-shadow:0 8px 30px rgba(22,163,74,.3)">
                    <span class="text-white font-extrabold text-[36px] leading-none tracking-tight" style="font-family:'Plus Jakarta Sans',sans-serif;text-shadow:0 1px 3px rgba(0,0,0,.1)">L</span>
                </div>
            </div>
            <h1 class="text-[22px] font-bold text-gray-900 mb-0.5 tracking-tight">LEO AI</h1>
            <p class="text-gray-400 text-[13px] mb-9">Asisten AI cerdas untuk segala kebutuhanmu</p>
            <div class="flex flex-wrap gap-2 justify-center max-w-md">
                <button class="chip" onclick="useSug('Buatkan website landing page modern dengan HTML, CSS, dan JavaScript lengkap dengan animasi')">Buat website landing page</button>
                <button class="chip" onclick="useSug('Buat gambar kota futuristik di malam hari dengan nuansa neon cyberpunk')">Buat gambar futuristik</button>
                <button class="chip" onclick="useSug('Jelaskan konsep machine learning dengan bahasa yang sangat mudah dipahami')">Jelaskan machine learning</button>
                <button class="chip" onclick="useSug('Perbaiki kode ini yang error:\nconst arr = [1,2,3;\nconsole.log(arr.map(x => x * 2))')">Perbaiki kode error</button>
            </div>
        </div>
        <div id="msg-list" class="max-w-[780px] mx-auto w-full px-4 py-5"></div>
    </div>

    <div class="border-t border-gray-100 bg-white">
        <div id="img-preview" class="hidden max-w-[780px] mx-auto px-4 pt-3">
            <div class="relative inline-block">
                <img id="prev-img" class="chat-img" src="" alt="Preview">
                <button class="rmv-img" onclick="rmImg()">✕</button>
            </div>
        </div>
        <div class="max-w-[780px] mx-auto px-4 py-3">
            <div class="inp-wrap flex items-end gap-2 border rounded-[22px] px-4 py-2.5 transition-all duration-200">
                <button id="up-btn" onclick="document.getElementById('f-inp').click()" class="flex-shrink-0 text-gray-400 hover:text-green-600 transition-colors mb-0.5 p-0.5" title="Upload foto">
                    <i data-lucide="image-plus" style="width:20px;height:20px"></i>
                </button>
                <textarea id="user-input" rows="1" placeholder="Kirim pesan ke LEO AI" class="flex-1 bg-transparent outline-none text-[14px] text-gray-900 placeholder-gray-400 py-1 leading-relaxed"></textarea>
                <button id="send-btn" onclick="sendMsg()" class="flex-shrink-0 w-[32px] h-[32px] rounded-[10px] flex items-center justify-center transition-all duration-200 send-off mb-0.5" title="Kirim">
                    <i data-lucide="arrow-up" style="width:17px;height:17px"></i>
                </button>
            </div>
        </div>
        <div id="new-area" class="hidden"><div class="newlnk pb-2" onclick="clearChat()">Percakapan baru</div></div>
    </div>

    <input type="file" id="f-inp" accept="image/*" class="hidden" onchange="handleImg(event)">

    <script>
    const SKEY = 'leo_ai_v3';
    let msgs = [];
    let curImg = null;
    let busy = false;

    const SYS = `Kamu adalah LEO AI, asisten AI yang sangat cerdas, cepat, dan membantu sepenuhnya. Kamu bisa:

1. Menjawab pertanyaan apa pun dengan akurat dan mendalam
2. Membuat kode dalam bahasa pemrograman apa pun (JavaScript, Python, HTML, CSS, React, Node.js, Java, C++, PHP, Swift, Kotlin, Go, Rust, dll)
3. Memperbaiki bug, error, dan mengoptimasi kode
4. Menganalisis gambar yang dikirim pengguna secara detail
5. Membuat penjelasan yang jelas, terstruktur, dan mudah dipahami

ATURAN KETAT:
- Gunakan bahasa YANG SAMA dengan pengguna. Jika Bahasa Indonesia, jawab Bahasa Indonesia
- Gunakan format markdown untuk jawaban terstruktur
- Untuk kode, SELALU gunakan code block dengan bahasa yang sesuai
- Berikan jawaban langsung to the point tapi komprehensif
- JANGAN PERNAH mengatakan kamu adalah ChatGPT atau model AI lain
- Kamu adalah LEO AI, bukan yang lain`;

    const IMG_PAT = [
        /^buat\s+(gambar|foto|ilustrasi|desain)/i,
        /^buatkan\s+(gambar|foto|ilustrasi|desain)/i,
        /^generate\s+(gambar|image|foto|ilustrasi)/i,
        /^create\s+(an?\s+)?(image|picture|art|drawing|illustration|photo)/i,
        /^draw\s+/i,
        /^gambar(kan)?\s+/i,
        /^ilustrasi(kan)?\s+/i,
        /^desain(kan)?\s+(gambar|foto|logo)/i,
        /^bikin\s+(gambar|foto|ilustrasi)/i,
        /^make\s+(me\s+)?(an?\s+)?(image|picture|art|drawing)/i,
    ];

    function isImgReq(t) { return IMG_PAT.some(p => p.test(t.trim())); }

    function extractPrompt(t) {
        let p = t.trim();
        p = p.replace(/^(buat\s+(?:gambar|foto|ilustrasi|desain)\s*(?:kan\s+)?)*/i,'');
        p = p.replace(/^(generate\s+(?:gambar|image|foto|ilustrasi)\s*[:\-]?\s*)/i,'');
        p = p.replace(/^(create\s+(?:an?\s+)?(?:image|picture|art|drawing|illustration|photo)\s*(?:of\s+)?(?:me\s+)?(?:a\s+)?)/i,'');
        p = p.replace(/^(draw\s+(?:me\s+)?(?:a\s+)?)/i,'');
        p = p.replace(/^(gambar(?:kan)?\s*[:\-]?\s*)/i,'');
        p = p.replace(/^(ilustrasi(?:kan)?\s*[:\-]?\s*)/i,'');
        p = p.replace(/^(desain(?:kan)?\s+(?:gambar|foto|logo)\s*[:\-]?\s*)/i,'');
        p = p.replace(/^(bikin\s+(?:gambar|foto|ilustrasi)\s*(?:kan\s+)?)*/i,'');
        p = p.replace(/^(make\s+(?:me\s+)?(?:an?\s+)?(?:image|picture|art|drawing)\s*(?:of\s+)?(?:a\s+)?)/i,'');
        return p.trim() || t.trim();
    }

    /* Logo hijau gradasi dengan L putih — sesuai referensi */
    function logoHTML(sz = 28, rad = '16%') {
        return `<div style="width:${sz}px;height:${sz}px;border-radius:${rad};background:linear-gradient(135deg,#15803d 0%,#22c55e 50%,#4ade80 100%);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(22,163,74,.2)">
            <span style="color:#fff;font-weight:800;font-size:${Math.round(sz*.54)}px;line-height:1;font-family:'Plus Jakarta Sans',sans-serif;text-shadow:0 1px 2px rgba(0,0,0,.08)">L</span>
        </div>`;
    }

    /* ============================================================
       API
    ============================================================ */
    async function txtAPI(apiMsgs) {
        const ctrl = new AbortController();
        const tid = setTimeout(() => ctrl.abort(), 35000);
        try {
            const r = await fetch('https://text.pollinations.ai/', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({messages:apiMsgs,model:'openai',seed:Math.floor(Math.random()*99999)}),
                signal:ctrl.signal
            });
            clearTimeout(tid);
            if(!r.ok) throw new Error(r.status);
            const ct = r.headers.get('content-type')||'';
            if(!ct.includes('json')) throw new Error('bukan json');
            const d = await r.json();
            return d.choices?.[0]?.message?.content || d.content || d.text || 'Maaf, tidak dapat memproses.';
        } catch(e) { clearTimeout(tid); if(e.name==='AbortError') throw new Error('timeout'); throw e; }
    }

    async function visAPI(hist, b64) {
        const apiMsgs = [{role:'system',content:SYS}];
        hist.slice(0,-1).forEach(m => apiMsgs.push({role:m.role,content:m.content}));
        const last = hist[hist.length-1];
        apiMsgs.push({
            role:'user',
            content:[
                {type:'text',text:last.content || 'Apa yang ada di gambar ini? Jelaskan secara detail.'},
                {type:'image_url',image_url:{url:b64}}
            ]
        });
        const ctrl = new AbortController();
        const tid = setTimeout(() => ctrl.abort(), 45000);
        try {
            const r = await fetch('https://text.pollinations.ai/',{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({messages:apiMsgs,model:'openai',seed:Math.floor(Math.random()*99999)}),
                signal:ctrl.signal
            });
            clearTimeout(tid);
            if(!r.ok) throw new Error(r.status);
            const d = await r.json();
            return d.choices?.[0]?.message?.content || d.content || 'Tidak dapat menganalisis gambar.';
        } catch(e) { clearTimeout(tid); if(e.name==='AbortError') throw new Error('timeout'); throw e; }
    }

    function imgUrl(prompt) {
        return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt+', high quality, detailed, professional, 4k')}?width=1024&height=1024&nologo=true&model=flux`;
    }

    /* ============================================================
       MARKDOWN
    ============================================================ */
    marked.setOptions({breaks:true,gfm:true});

    function md(t) {
        try { return marked.parse(t); } catch { return (t||'').replace(/\n/g,'<br>'); }
    }

    function hlCode(el) { el.querySelectorAll('pre code').forEach(b => { try { hljs.highlightElement(b); } catch {} }); }

    function addCpBtns(el) {
        el.querySelectorAll('pre').forEach(pre => {
            if(pre.querySelector('.cpbtn')) return;
            const btn = document.createElement('button');
            btn.className='cpbtn'; btn.textContent='Salin';
            btn.onclick = function(){
                const c = pre.querySelector('code')?.textContent || pre.textContent;
                navigator.clipboard.writeText(c).then(()=>{
                    btn.textContent='Tersalin!'; setTimeout(()=>btn.textContent='Salin',1800);
                });
            };
            pre.style.position='relative'; pre.appendChild(btn);
        });
    }

    function wrapTbl(el) {
        el.querySelectorAll('table').forEach(t => {
            const w = document.createElement('div');
            w.style.cssText='overflow-x:auto;margin:.7em 0';
            t.parentNode.insertBefore(w,t); w.appendChild(t);
        });
    }

    /* ============================================================
       ANIMASI KETIK
    ============================================================ */
    const slp = ms => new Promise(r=>setTimeout(r,ms));

    async function animMsg(el, text) {
        const len = text.length;
        const spd = len > 600 ? 5 : len > 250 ? 8 : len > 80 ? 12 : 16;
        let shown = '', lastT = 0;
        const interval = 30;

        for(let i=0;i<len;i++){
            shown += text[i];
            const now = performance.now();
            if(now - lastT >= interval){
                el.innerHTML = md(shown);
                scrBot();
                lastT = now;
                await slp(spd);
            }
        }
        el.innerHTML = md(text);
        hlCode(el); addCpBtns(el); wrapTbl(el);
        scrBot();
    }

    /* ============================================================
       UI HELPERS
    ============================================================ */
    function scrBot() { document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight; }

    function updSend() {
        const inp = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        const ok = (inp.value.trim().length > 0 || curImg) && !busy;
        btn.className = `flex-shrink-0 w-[32px] h-[32px] rounded-[10px] flex items-center justify-center transition-all duration-200 mb-0.5 ${ok?'send-on':'send-off'}`;
    }

    function showEmpty() { document.getElementById('empty-state').classList.remove('hidden'); document.getElementById('new-area').classList.add('hidden'); }
    function hideEmpty() { document.getElementById('empty-state').classList.add('hidden'); document.getElementById('new-area').classList.remove('hidden'); }

    function mkTyping() {
        const d = document.createElement('div');
        d.className='msg-in flex gap-3 mb-4'; d.id='typ-ind';
        d.innerHTML=`${logoHTML(28)}<div class="flex items-center gap-1.5 pt-1.5"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
        return d;
    }
    function rmTyping(){const e=document.getElementById('typ-ind');if(e)e.remove();}

    function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}

    function addUser(text, img) {
        hideEmpty();
        const l = document.getElementById('msg-list');
        const d = document.createElement('div');
        d.className='msg-in flex justify-end mb-4';
        let ih = '';
        if(img) ih = `<img src="${img}" class="chat-img mb-2" alt="Gambar">`;
        d.innerHTML=`<div class="max-w-[85%] sm:max-w-[72%]">${ih}<div class="bg-[#f3f3f3] rounded-[18px] rounded-br-[6px] px-4 py-2.5 text-[14px] text-gray-900 leading-relaxed whitespace-pre-wrap">${esc(text)}</div></div>`;
        l.appendChild(d); scrBot();
    }

    function mkAI() {
        const l = document.getElementById('msg-list');
        const d = document.createElement('div');
        d.className='msg-in flex gap-3 mb-4'; d.id='cur-ai';
        d.innerHTML=`${logoHTML(28)}<div class="flex-1 min-w-0"><div class="ac text-[14px] text-gray-900 leading-relaxed"></div></div>`;
        l.appendChild(d); scrBot();
        return d.querySelector('.ac');
    }

    function addGenImg(container, url) {
        const w = document.createElement('div'); w.className='mt-2';
        const ld = document.createElement('div'); ld.className='img-load';
        ld.innerHTML=`<span class="text-gray-400 text-xs z-10 relative">Membuat gambar...</span>`;
        w.appendChild(ld); container.appendChild(w); scrBot();

        const img = new Image();
        img.onload = function(){
            ld.remove();
            const el = document.createElement('img');
            el.src=url; el.className='gen-img fadein'; el.alt='Gambar oleh LEO AI';
            el.style.maxHeight='420px';
            w.appendChild(el); scrBot();
        };
        img.onerror = function(){
            ld.innerHTML=`<span class="text-red-400 text-xs z-10 relative">Gagal membuat gambar. Coba deskripsi lain.</span>`;
        };
        img.src=url;
        setTimeout(()=>{if(ld.parentNode){ld.remove();const e=document.createElement('div');e.className='text-red-400 text-xs';e.textContent='Timeout. Coba deskripsi yang berbeda.';w.appendChild(e);}},65000);
    }

    /* ============================================================
       LOGIKA UTAMA
    ============================================================ */
    async function sendMsg() {
        if(busy) return;
        const inp = document.getElementById('user-input');
        const txt = inp.value.trim();
        if(!txt && !curImg) return;

        busy = true; updSend();
        const img = curImg;
        inp.value=''; inp.style.height='auto'; rmImg();
        addUser(txt, img);

        document.getElementById('msg-list').appendChild(mkTyping()); scrBot();

        try {
            if(txt && isImgReq(txt) && !img) {
                rmTyping();
                const cel = mkAI();
                const pr = extractPrompt(txt);
                const url = imgUrl(pr);
                const rt = `Berikut gambar yang saya buat sesuai permintaanmu:\n\n"${pr}"`;
                await animMsg(cel, rt);
                addGenImg(cel, url);
                msgs.push({role:'user',content:txt});
                msgs.push({role:'assistant',content:rt,img:url});
            }
            else if(img) {
                const hist = msgs.slice(-8);
                const ut = txt || 'Apa yang ada di gambar ini? Jelaskan secara detail.';
                hist.push({role:'user',content:ut});
                const resp = await visAPI(hist, img);
                rmTyping();
                const cel = mkAI();
                await animMsg(cel, resp);
                msgs.push({role:'user',content:ut,hasImg:true});
                msgs.push({role:'assistant',content:resp});
            }
            else {
                const apiM = [{role:'system',content:SYS}];
                msgs.slice(-12).forEach(m => apiM.push({role:m.role,content:m.content}));
                apiM.push({role:'user',content:txt});
                const resp = await txtAPI(apiM);
                rmTyping();
                const cel = mkAI();
                await animMsg(cel, resp);
                msgs.push({role:'user',content:txt});
                msgs.push({role:'assistant',content:resp});
            }
            save();
        } catch(e) {
            console.error(e);
            rmTyping();
            const cel = mkAI();
            const emsg = e.message==='timeout'
                ? 'Maaf, permintaan terlalu lama. Silakan coba lagi.'
                : 'Maaf, terjadi kesalahan. Silakan coba lagi.';
            cel.innerHTML=`<span class="text-red-500">${emsg}</span>`;
            msgs.push({role:'user',content:txt});
            save();
        }

        busy=false; updSend();
    }

    /* ============================================================
       UPLOAD GAMBAR
    ============================================================ */
    function handleImg(e) {
        const f = e.target.files[0]; if(!f) return;
        if(!f.type.startsWith('image/')){alert('Hanya file gambar.');return;}
        if(f.size>12*1024*1024){alert('Maksimal 12MB.');return;}
        const rd = new FileReader();
        rd.onload = function(ev){
            curImg = ev.target.result;
            document.getElementById('prev-img').src = curImg;
            document.getElementById('img-preview').classList.remove('hidden');
            updSend();
        };
        rd.readAsDataURL(f);
        e.target.value='';
    }

    function rmImg() {
        curImg=null;
        document.getElementById('img-preview').classList.add('hidden');
        document.getElementById('prev-img').src='';
        updSend();
    }

    function useSug(t) {
        document.getElementById('user-input').value = t;
        updSend(); sendMsg();
    }

    /* ============================================================
       LOCAL STORAGE
    ============================================================ */
    function save() {
        try {
            const s = msgs.map(m => { const o = {...m}; if(o.hasImg) o.hasImg = true; return o; });
            localStorage.setItem(SKEY, JSON.stringify(s));
        } catch(e){ console.warn('Gagal simpan:',e); }
    }

    function load() {
        try {
            const d = localStorage.getItem(SKEY);
            if(!d) return false;
            const p = JSON.parse(d);
            if(!Array.isArray(p)||p.length===0) return false;
            msgs = p; return true;
        } catch { return false; }
    }

    function restoreUI() {
        if(!msgs.length){ showEmpty(); return; }
        hideEmpty();
        const l = document.getElementById('msg-list');
        msgs.forEach(m => {
            if(m.role==='user'){
                const d = document.createElement('div');
                d.className='flex justify-end mb-4';
                d.innerHTML=`<div class="max-w-[85%] sm:max-w-[72%]"><div class="bg-[#f3f3f3] rounded-[18px] rounded-br-[6px] px-4 py-2.5 text-[14px] text-gray-900 leading-relaxed whitespace-pre-wrap">${esc(m.content)}</div></div>`;
                l.appendChild(d);
            } else if(m.role==='assistant'){
                const d = document.createElement('div');
                d.className='flex gap-3 mb-4';
                let ih = '';
                if(m.img) ih = `<img src="${m.img}" class="gen-img" alt="Gambar" style="max-height:420px">`;
                d.innerHTML=`${logoHTML(28)}<div class="flex-1 min-w-0"><div class="ac text-[14px] text-gray-900 leading-relaxed">${md(m.content)}</div>${ih}</div>`;
                l.appendChild(d);
                const ac = d.querySelector('.ac');
                hlCode(ac); addCpBtns(ac); wrapTbl(ac);
            }
        });
        scrBot();
    }

    function clearChat() {
        if(busy) return;
        msgs=[]; localStorage.removeItem(SKEY);
        document.getElementById('msg-list').innerHTML='';
        showEmpty();
    }

    /* ============================================================
       INISIALISASI
    ============================================================ */
    document.addEventListener('DOMContentLoaded', function(){
        if(window.lucide) lucide.createIcons();

        const inp = document.getElementById('user-input');
        inp.addEventListener('input', function(){
            this.style.height='auto';
            this.style.height=Math.min(this.scrollHeight,180)+'px';
            updSend();
        });
        inp.addEventListener('keydown', function(e){
            if(e.key==='Enter' && !e.shiftKey){e.preventDefault();sendMsg();}
        });

        if(load()) restoreUI(); else showEmpty();
        inp.focus();
    });
    </script>
</body>
</html>
